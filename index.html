<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Where is It? Zip Can Help!</title>
    <!-- 載入必要的函式庫 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    
    <style>
        /* 避免平板點擊時出現藍色方塊 */
        body { -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* 單字發亮樣式 */
        .active-word {
            background-color: #fbbf24;
            color: #78350f;
            transform: scale(1.15) rotate(1deg);
            box-shadow: 0 4px 10px rgba(251, 191, 36, 0.4);
            border-radius: 8px;
        }

        /* 自定義滑動條樣式 (平板友善) */
        input[type='range']::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 28px;
            width: 28px;
            border-radius: 50%;
            background: #f59e0b;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border: 2px solid white;
        }
    </style>
</head>
<body class="bg-[#FFFBEB]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // API Key 會由執行環境自動注入
        const apiKey = ""; 

        const App = () => {
            const [currentPage, setCurrentPage] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [activeWordIndex, setActiveWordIndex] = useState(-1);
            const [speed, setSpeed] = useState(1.0);
            const audioRef = useRef(null);
            const timerRef = useRef(null);

            const storyData = [
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/ef7e66e2e8da6e700770612134e2f32ea9b41a04/0.jpg?raw=true",
                    text: "Wei is a boy. He is messy. Zip is a smart robot. 'Oh no! Where is my red pen?' says Wei.",
                    page: "Page 1"
                },
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/main/1.jpg?raw=true",
                    text: "Zip looks around. 'It is on the desk,' says Zip. Wei looks. There is the red pen! 'Thank you, Zip!'",
                    page: "Page 2"
                },
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/main/2.jpg?raw=true",
                    text: "'Where is my yellow pencil?' asks Wei. Zip points down. 'It is under the chair,' says Zip. Wei finds the yellow pencil.",
                    page: "Page 3"
                },
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/main/3.jpg?raw=true",
                    text: "'Where is my blue eraser?' asks Wei. Zip looks at the bookshelf. 'It is in the box,' says Zip. Wei sees the blue eraser!",
                    page: "Page 4"
                },
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/main/4.jpg?raw=true",
                    text: "'Where is my purple pencil box?' asks Wei. Zip looks under the bed. 'It is under the bed,' says Zip. Wei sees it!",
                    page: "Page 5"
                },
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/main/5.jpg?raw=true",
                    text: "'Where is my orange yo-yo?' asks Wei. Zip points to the toy box. 'It is in the toy box,' says Zip. 'You are the best, Zip!'",
                    page: "Page 6"
                },
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/main/6.jpg?raw=true",
                    text: "'Where is my kite?' asks Wei. Zip points up. 'It is on the wall,' says Zip. Wei is very happy.",
                    page: "Page 7"
                },
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/main/7.jpg?raw=true",
                    text: "'Where is my red ruler?' asks Wei. Zip looks at the door. 'It is by the door,' says Zip. Wei gets the ruler.",
                    page: "Page 8"
                },
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/main/8.jpg?raw=true",
                    text: "'Where are my markers?' asks Wei. Zip points to the closet. 'They are in the drawer,' says Zip. Wei has everything now!",
                    page: "Page 9"
                },
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/main/9.jpg?raw=true",
                    text: "Wei puts on his school bag. He is ready for school. 'Goodbye, Zip!' says Wei. Zip waves goodbye. It is a great day!",
                    page: "Page 10"
                }
            ];

            useEffect(() => {
                if (audioRef.current) audioRef.current.playbackRate = speed;
            }, [speed]);

            const pcmToWav = (pcmData, sampleRate) => {
                const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                const view = new DataView(buffer);
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
                };
                writeString(0, 'RIFF');
                view.setUint32(4, 36 + pcmData.length * 2, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, pcmData.length * 2, true);
                for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const speakText = async (text) => {
                if (isPlaying) { stopAudio(); return; }
                setIsLoading(true);
                setIsPlaying(true);
                setActiveWordIndex(-1);
                
                const words = text.split(/\s+/);
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Read this story page: ${text}` }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: {
                                    voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } }
                                }
                            }
                        })
                    });

                    const result = await response.json();
                    const audioDataB64 = result.candidates[0].content.parts[0].inlineData.data;
                    const mimeType = result.candidates[0].content.parts[0].inlineData.mimeType;
                    const sampleRate = parseInt(mimeType.match(/sample_rate=(\d+)/)?.[1] || "24000");
                    
                    const binaryString = atob(audioDataB64);
                    const bytes = new Int16Array(binaryString.length / 2);
                    for (let i = 0; i < binaryString.length; i += 2) {
                        bytes[i / 2] = (binaryString.charCodeAt(i + 1) << 8) | binaryString.charCodeAt(i);
                    }

                    const wavBlob = pcmToWav(bytes, sampleRate);
                    const url = URL.createObjectURL(wavBlob);
                    
                    if (audioRef.current) {
                        audioRef.current.src = url;
                        audioRef.current.playbackRate = speed;
                        
                        audioRef.current.onloadedmetadata = () => {
                            const actualDuration = audioRef.current.duration / speed;
                            const timePerWord = (actualDuration * 1000) / words.length;
                            
                            audioRef.current.play();
                            
                            let currentWord = 0;
                            setActiveWordIndex(0);
                            
                            clearInterval(timerRef.current);
                            timerRef.current = setInterval(() => {
                                currentWord++;
                                if (currentWord < words.length) {
                                    setActiveWordIndex(currentWord);
                                } else {
                                    clearInterval(timerRef.current);
                                }
                            }, timePerWord);
                        };

                        audioRef.current.onended = () => {
                            setIsPlaying(false);
                            setActiveWordIndex(-1);
                            clearInterval(timerRef.current);
                        };
                    }
                } catch (error) {
                    console.error("TTS Error:", error);
                    setIsPlaying(false);
                } finally {
                    setIsLoading(false);
                }
            };

            const stopAudio = () => {
                if (audioRef.current) {
                    audioRef.current.pause();
                    audioRef.current.currentTime = 0;
                }
                setIsPlaying(false);
                setActiveWordIndex(-1);
                clearInterval(timerRef.current);
            };

            const currentStory = storyData[currentPage];
            const words = currentStory.text.split(/\s+/);

            return (
                <div className="min-h-screen flex flex-col items-center p-4 md:p-8 bg-[#FFFBEB]">
                    <audio ref={audioRef} className="hidden" />
                    
                    {/* 標題與頁碼 */}
                    <div className="max-w-5xl w-full flex justify-between items-center mb-6">
                        <h1 className="text-2xl md:text-3xl font-black text-amber-800 flex items-center gap-3">
                            <i className="lucide-volume-2 text-amber-600 scale-125"></i>
                            Where is It? Zip Can Help!
                        </h1>
                        <div className="bg-amber-200 px-6 py-2 rounded-full text-amber-900 font-black shadow-inner">
                            {currentPage + 1} / 10
                        </div>
                    </div>

                    {/* 主卡片內容 */}
                    <div className="max-w-6xl w-full bg-white rounded-[3rem] shadow-2xl flex flex-col md:flex-row min-h-[550px] overflow-hidden border-[12px] border-white ring-1 ring-amber-100">
                        
                        {/* 圖片區 */}
                        <div className="w-full md:w-1/2 bg-amber-50 p-6 flex items-center justify-center relative">
                            <img 
                                src={currentStory.img} 
                                className="rounded-[2rem] shadow-xl w-full h-full object-cover border-4 border-white" 
                                alt="story" 
                            />
                            <div className="absolute top-10 left-10 bg-white/90 backdrop-blur-sm px-4 py-1 rounded-full text-xs font-bold text-amber-800 shadow-sm">
                                {currentStory.page}
                            </div>
                        </div>

                        {/* 文字與控制區 */}
                        <div className="w-full md:w-1/2 p-8 md:p-14 flex flex-col justify-between bg-gradient-to-br from-white to-amber-50/20">
                            <div className="flex-1 flex items-center">
                                <p className="text-3xl md:text-4xl leading-[1.6] text-slate-800 font-semibold tracking-wide">
                                    {words.map((w, i) => (
                                        <span key={i} className={`inline-block mr-3 px-2 py-1 transition-all duration-300 ${i === activeWordIndex ? 'active-word' : ''}`}>
                                            {w}
                                        </span>
                                    ))}
                                </p>
                            </div>

                            {/* 平板大控制按鈕 */}
                            <div className="mt-12 space-y-8 flex flex-col items-center">
                                
                                {/* 語速控制 */}
                                <div className="w-full max-w-sm space-y-4 bg-amber-50/50 p-5 rounded-2xl border border-amber-100 shadow-inner">
                                    <div className="flex justify-between items-center text-amber-700 font-black text-sm">
                                        <div className="flex items-center gap-2"><i className="lucide-turtle"></i> 慢</div>
                                        <span className="bg-amber-500 text-white px-3 py-1 rounded-full text-xs">語速: {speed.toFixed(1)}x</span>
                                        <div className="flex items-center gap-2">快 <i className="lucide-rabbit"></i></div>
                                    </div>
                                    <input 
                                        type="range" 
                                        min="0.5" 
                                        max="2.0" 
                                        step="0.1" 
                                        value={speed} 
                                        onChange={e => setSpeed(parseFloat(e.target.value))} 
                                        className="w-full h-4 bg-amber-200 rounded-lg appearance-none accent-amber-600 cursor-pointer" 
                                    />
                                </div>

                                {/* 朗讀按鈕 */}
                                <button 
                                    onClick={() => speakText(currentStory.text)} 
                                    disabled={isLoading} 
                                    className={`w-full max-w-sm py-6 rounded-full font-black text-2xl text-white shadow-2xl transition-all active:scale-95 transform hover:-translate-y-1 flex items-center justify-center gap-4 ${
                                        isLoading ? 'bg-slate-300' : isPlaying ? 'bg-rose-500 shadow-rose-200' : 'bg-amber-500 shadow-amber-200 hover:bg-amber-600'
                                    }`}
                                >
                                    {isLoading ? (
                                        <i className="lucide-loader-2 animate-spin"></i>
                                    ) : isPlaying ? (
                                        <><i className="lucide-square fill-current"></i> 停止播放</>
                                    ) : (
                                        <><i className="lucide-play fill-current"></i> 開始朗讀</>
                                    )}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* 下方導航 */}
                    <div className="max-w-4xl w-full mt-10 flex justify-between items-center px-4">
                        <button 
                            onClick={() => { stopAudio(); setCurrentPage(p => (p - 1 + 10) % 10); }} 
                            className="flex items-center gap-2 text-amber-700 font-black text-xl p-4 hover:bg-amber-100 rounded-3xl transition-colors"
                        >
                            <i className="lucide-chevron-left text-3xl"></i> 上一頁
                        </button>
                        
                        <div className="hidden sm:flex gap-3">
                            {storyData.map((_, idx) => (
                                <div key={idx} className={`h-3 rounded-full transition-all duration-300 ${idx === currentPage ? 'w-10 bg-amber-600' : 'w-3 bg-amber-200'}`} />
                            ))}
                        </div>

                        <button 
                            onClick={() => { stopAudio(); setCurrentPage(p => (p + 1) % 10); }} 
                            className="flex items-center gap-2 text-amber-700 font-black text-xl p-4 hover:bg-amber-100 rounded-3xl transition-colors"
                        >
                            下一頁 <i className="lucide-chevron-right text-3xl"></i>
                        </button>
                    </div>
                    
                    <p className="mt-12 text-amber-800/40 font-bold text-xs tracking-widest uppercase">Wei and Zip's Learning Adventure</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
