<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Where is It? Zip Can Help!</title>
    <!-- 核心函式庫 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap');
        
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Lexend', sans-serif;
            overflow-x: hidden;
        }
        
        /* 互動發亮效果 */
        .active-word {
            background-color: #fbbf24;
            color: #78350f;
            transform: scale(1.1) rotate(1deg);
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.4);
            border-radius: 8px;
            z-index: 10;
        }

        /* 平板友善的滑桿 */
        input[type='range'] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type='range']::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 32px;
            width: 32px;
            border-radius: 50%;
            background: #f59e0b;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            border: 3px solid white;
            margin-top: -12px;
        }
        input[type='range']::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            background: #fef3c7;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-[#FFFBEB]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /**
         * 重要提示：
         * 當您將此檔案部署到 GitHub Pages 時，
         * 您需要在此處填入您的 Google API Key 才能使用語音功能。
         */
        const apiKey = ""; 

        const App = () => {
            const [currentPage, setCurrentPage] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [activeWordIndex, setActiveWordIndex] = useState(-1);
            const [speed, setSpeed] = useState(1.0);
            const [showKeyAlert, setShowKeyAlert] = useState(false);
            const audioRef = useRef(null);
            const timerRef = useRef(null);

            const storyData = [
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/ef7e66e2e8da6e700770612134e2f32ea9b41a04/0.jpg?raw=true",
                    text: "Wei is a boy. He is messy. Zip is a smart robot. 'Oh no! Where is my red pen?' says Wei.",
                    page: "Page 1"
                },
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/main/1.jpg?raw=true",
                    text: "Zip looks around. 'It is on the desk,' says Zip. Wei looks. There is the red pen! 'Thank you, Zip!'",
                    page: "Page 2"
                },
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/main/2.jpg?raw=true",
                    text: "'Where is my yellow pencil?' asks Wei. Zip points down. 'It is under the chair,' says Zip. Wei finds the yellow pencil.",
                    page: "Page 3"
                },
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/main/3.jpg?raw=true",
                    text: "'Where is my blue eraser?' asks Wei. Zip looks at the bookshelf. 'It is in the box,' says Zip. Wei sees the blue eraser!",
                    page: "Page 4"
                },
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/main/4.jpg?raw=true",
                    text: "'Where is my purple pencil box?' asks Wei. Zip looks under the bed. 'It is under the bed,' says Zip. Wei sees it!",
                    page: "Page 5"
                },
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/main/5.jpg?raw=true",
                    text: "'Where is my orange yo-yo?' asks Wei. Zip points to the toy box. 'It is in the toy box,' says Zip. 'You are the best, Zip!'",
                    page: "Page 6"
                },
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/main/6.jpg?raw=true",
                    text: "'Where is my kite?' asks Wei. Zip points up. 'It is on the wall,' says Zip. Wei is very happy.",
                    page: "Page 7"
                },
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/main/7.jpg?raw=true",
                    text: "'Where is my red ruler?' asks Wei. Zip looks at the door. 'It is by the door,' says Zip. Wei gets the ruler.",
                    page: "Page 8"
                },
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/main/8.jpg?raw=true",
                    text: "'Where are my markers?' asks Wei. Zip points to the closet. 'They are in the drawer,' says Zip. Wei has everything now!",
                    page: "Page 9"
                },
                {
                    img: "https://github.com/jwjennywu23-byte/my-storybook-assets/blob/main/9.jpg?raw=true",
                    text: "Wei puts on his school bag. He is ready for school. 'Goodbye, Zip!' says Wei. Zip waves goodbye. It is a great day!",
                    page: "Page 10"
                }
            ];

            const pcmToWav = (pcmData, sampleRate) => {
                const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                const view = new DataView(buffer);
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
                };
                writeString(0, 'RIFF');
                view.setUint32(4, 36 + pcmData.length * 2, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, pcmData.length * 2, true);
                for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const speakText = async (text) => {
                if (isPlaying) { stopAudio(); return; }
                
                if (!apiKey) {
                    setShowKeyAlert(true);
                    return;
                }

                setIsLoading(true);
                setIsPlaying(true);
                setActiveWordIndex(-1);
                
                const words = text.split(/\s+/);
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                            }
                        })
                    });

                    const result = await response.json();
                    if (!result.candidates) throw new Error("API Key Invalid");

                    const audioDataB64 = result.candidates[0].content.parts[0].inlineData.data;
                    const mimeType = result.candidates[0].content.parts[0].inlineData.mimeType;
                    const sampleRate = parseInt(mimeType.match(/sample_rate=(\d+)/)?.[1] || "24000");
                    
                    const binaryString = atob(audioDataB64);
                    const bytes = new Int16Array(binaryString.length / 2);
                    for (let i = 0; i < binaryString.length; i += 2) {
                        bytes[i / 2] = (binaryString.charCodeAt(i + 1) << 8) | binaryString.charCodeAt(i);
                    }

                    const wavBlob = pcmToWav(bytes, sampleRate);
                    const url = URL.createObjectURL(wavBlob);
                    
                    if (audioRef.current) {
                        audioRef.current.src = url;
                        audioRef.current.playbackRate = speed;
                        audioRef.current.onloadedmetadata = () => {
                            const actualDuration = audioRef.current.duration / speed;
                            const timePerWord = (actualDuration * 1000) / words.length;
                            audioRef.current.play();
                            let currentWord = 0;
                            setActiveWordIndex(0);
                            timerRef.current = setInterval(() => {
                                currentWord++;
                                if (currentWord < words.length) setActiveWordIndex(currentWord);
                                else clearInterval(timerRef.current);
                            }, timePerWord);
                        };
                        audioRef.current.onended = () => { setIsPlaying(false); setActiveWordIndex(-1); clearInterval(timerRef.current); };
                    }
                } catch (error) {
                    console.error(error);
                    setIsPlaying(false);
                } finally {
                    setIsLoading(false);
                }
            };

            const stopAudio = () => {
                if (audioRef.current) { audioRef.current.pause(); audioRef.current.currentTime = 0; }
                setIsPlaying(false); setActiveWordIndex(-1); clearInterval(timerRef.current);
            };

            const currentStory = storyData[currentPage];
            const words = currentStory.text.split(/\s+/);

            return (
                <div className="min-h-screen flex flex-col items-center p-4 md:p-8 bg-[#FFFBEB] select-none">
                    <audio ref={audioRef} className="hidden" />
                    
                    {/* API 警告彈窗 */}
                    {showKeyAlert && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                            <div className="bg-white p-8 rounded-[2rem] shadow-2xl max-w-sm w-full text-center space-y-4">
                                <div className="text-amber-500 mx-auto w-16 h-16 bg-amber-50 rounded-full flex items-center justify-center">
                                    <i className="lucide-key text-3xl"></i>
                                </div>
                                <h2 className="text-2xl font-bold text-slate-800">尚未填寫 API Key</h2>
                                <p className="text-slate-500 leading-relaxed">語音功能需要您的 Google API 金鑰才能運作。請在 index.html 檔案中找到 <b>const apiKey = ""</b> 並填入您的金鑰。</p>
                                <button onClick={() => setShowKeyAlert(false)} className="w-full py-3 bg-amber-500 text-white rounded-full font-bold">我知道了</button>
                            </div>
                        </div>
                    )}

                    <div className="max-w-5xl w-full flex justify-between items-center mb-6">
                        <div className="flex items-center gap-3">
                            <div className="bg-white p-3 rounded-2xl shadow-md text-amber-600">
                                <i className="lucide-book-open text-2xl"></i>
                            </div>
                            <h1 className="text-2xl md:text-3xl font-black text-amber-900">Zip Can Help!</h1>
                        </div>
                        <div className="bg-white/80 px-6 py-2 rounded-full text-amber-900 font-black shadow-sm border border-amber-200">
                            {currentPage + 1} / 10
                        </div>
                    </div>

                    <div className="max-w-6xl w-full bg-white rounded-[3.5rem] shadow-2xl flex flex-col lg:flex-row min-h-[600px] overflow-hidden border-[12px] border-white relative">
                        {/* 圖片區 */}
                        <div className="w-full lg:w-3/5 bg-amber-50 p-6 flex items-center justify-center">
                            <img src={currentStory.img} className="rounded-[2.5rem] shadow-lg w-full h-full object-cover border-2 border-white" alt="story" />
                        </div>

                        {/* 文字與控制區 */}
                        <div className="w-full lg:w-2/5 p-8 md:p-12 flex flex-col justify-between bg-gradient-to-br from-white to-amber-50/30">
                            <div className="flex-1 flex items-center">
                                <div className="text-3xl md:text-4xl leading-[1.6] text-slate-800 font-bold">
                                    {words.map((w, i) => (
                                        <span key={i} className={`inline-block mr-3 px-2 py-1 transition-all duration-300 ${i === activeWordIndex ? 'active-word' : ''}`}>
                                            {w}
                                        </span>
                                    ))}
                                </div>
                            </div>

                            <div className="mt-12 space-y-8 flex flex-col items-center">
                                <div className="w-full space-y-4 bg-white/60 p-6 rounded-3xl border border-amber-100">
                                    <div className="flex justify-between items-center text-amber-700 font-black text-sm">
                                        <div className="flex items-center gap-2"><i className="lucide-turtle"></i> SLOW</div>
                                        <span className="bg-amber-100 text-amber-800 px-4 py-1 rounded-full">{speed.toFixed(1)}x</span>
                                        <div className="flex items-center gap-2">FAST <i className="lucide-rabbit"></i></div>
                                    </div>
                                    <input type="range" min="0.5" max="2.0" step="0.1" value={speed} onChange={e => setSpeed(parseFloat(e.target.value))} className="w-full" />
                                </div>

                                <button onClick={() => speakText(currentStory.text)} disabled={isLoading} className={`w-full py-6 rounded-full font-black text-2xl text-white shadow-xl transition-all active:scale-95 flex items-center justify-center gap-4 ${isLoading ? 'bg-slate-300' : isPlaying ? 'bg-rose-500' : 'bg-amber-500'}`}>
                                    {isLoading ? <i className="lucide-loader-2 animate-spin"></i> : isPlaying ? <><i className="lucide-square fill-current"></i> STOP</> : <><i className="lucide-volume-2"></i> READ ALOUD</>}
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-4xl w-full mt-10 flex justify-between items-center">
                        <button onClick={() => { stopAudio(); setCurrentPage(p => (p - 1 + 10) % 10); }} className="flex items-center gap-2 text-amber-700 font-black text-2xl p-6 hover:bg-amber-100 rounded-full transition-all active:scale-90">
                            <i className="lucide-chevron-left text-4xl"></i>
                        </button>
                        
                        <div className="flex gap-4">
                            {storyData.map((_, idx) => (
                                <button key={idx} onClick={() => { stopAudio(); setCurrentPage(idx); }} className={`h-4 rounded-full transition-all duration-500 ${idx === currentPage ? 'w-12 bg-amber-600 shadow-md' : 'w-4 bg-amber-200'}`} />
                            ))}
                        </div>

                        <button onClick={() => { stopAudio(); setCurrentPage(p => (p + 1) % 10); }} className="flex items-center gap-2 text-amber-700 font-black text-2xl p-6 hover:bg-amber-100 rounded-full transition-all active:scale-90">
                            <i className="lucide-chevron-right text-4xl"></i>
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
